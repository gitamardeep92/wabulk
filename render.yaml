# render.yaml
# One backend web service + two free static sites
# No persistent disk needed — sessions saved to Supabase

services:

  # ── Backend (API + serves frontend/admin/marketing) ───────
  - type: web
    name: wabulk-api
    env: node
    region: singapore       # closest to India
    plan: free              # UptimeRobot keeps it awake
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000         # Render free uses port 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: REDIS_URL
        sync: false          # paste your Upstash rediss:// URL
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false          # set to your .onrender.com URL after first deploy

  # ── NOTE ──────────────────────────────────────────────────
  # Frontend and admin are built INTO the backend by npm run build
  # and served by Express at /app and /admin paths.
  # No separate static site services needed.
  #
  # Your URLs after deploy:
  #   https://wabulk-api.onrender.com/        marketing
  #   https://wabulk-api.onrender.com/app     dashboard
  #   https://wabulk-api.onrender.com/admin   admin panel
  #   https://wabulk-api.onrender.com/v1/...  API
