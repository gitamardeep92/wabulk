# render.yaml — Deploy to Render
# Place this in the root of your backend repo

services:
  # ── Backend API ─────────────────────────────────────────
  - type: web
    name: wabulk-api
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: SUPABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: wabulk-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # e.g. https://app.wabulk.com
      - key: ADMIN_URL
        sync: false   # e.g. https://admin.wabulk.com
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false   # bcrypt hash of your admin password
      - key: SESSION_PATH
        value: /opt/render/project/wa-sessions

    # Persistent disk for WhatsApp sessions
    disk:
      name: wa-sessions
      mountPath: /opt/render/project/wa-sessions
      sizeGB: 1

  # ── Frontend Dashboard ───────────────────────────────────
  - type: web
    name: wabulk-app
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://wabulk-api.onrender.com

  # ── Admin Panel ──────────────────────────────────────────
  - type: web
    name: wabulk-admin
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://wabulk-api.onrender.com

  # ── Redis ────────────────────────────────────────────────
  - type: redis
    name: wabulk-redis
    region: singapore
    plan: starter
    maxmemoryPolicy: noeviction
